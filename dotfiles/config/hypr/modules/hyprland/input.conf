# ║  THE DOTS — modules/hyprland/input.conf                      ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Keyboard, mouse, touchpad, and gesture config.    ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Variables/#input ║
# ║            https://wiki.hyprland.org/Configuring/Variables/#gestures ║
# ╚══════════════════════════════════════════════════════════════╝
#
# NOTE: Hyprland uses libinput for input handling.
# For advanced device-specific configs (e.g. per-device sensitivity),
# use the `device {}` block further below.
# ─────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# KEYBOARD
# https://wiki.hyprland.org/Configuring/Variables/#input
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

input {
    # Keyboard layout (XKB format).
    # Run `localectl list-x11-keymap-layouts` to see all available layouts.
    kb_layout = us

    # Keyboard variant (e.g. "dvorak", "colemak", "intl").
    # Leave empty for the default variant of the layout.
    kb_variant =

    # Keyboard model — leave empty for default (AT-translated-set-2-keyboard).
    kb_model =

    # XKB options — modifier key behaviour.
    # Examples:
    #   caps:escape         → Caps Lock acts as Escape
    #   caps:super          → Caps Lock acts as Super (VERY useful)
    #   caps:ctrl_modifier  → Caps Lock acts as Ctrl when held
    #   compose:ralt        → Right Alt becomes Compose key
    # Multiple options: "caps:escape,compose:ralt"
    kb_options = caps:escape

    # XKB rules file — leave empty for default.
    kb_rules =

    # ── Key repeat ─────────────────────────────────
    # Delay before key repeat starts (ms). Default 600. Lower = faster trigger.
    repeat_delay = 300

    # Key repeat rate (keys per second). Default 25. Higher = faster repeat.
    repeat_rate = 50

    # ── Mouse focus ────────────────────────────────
    # Mouse focus behaviour:
    #   0 = focus only when clicked
    #   1 = focus follows mouse (hover to focus)
    #   2 = focus follows mouse, but doesn't warp cursor to focused window
    #   3 = focus follows mouse, focus doesn't change when entering a floating window
    follow_mouse = 1

    # Focus the window under the cursor when moving mouse from a floating window.
    mouse_refocus = true

    # Don't focus a window if a fullscreen window is on the same monitor.
    # Prevents accidentally losing fullscreen focus.
    # focus_on_close = 0

    # ── Mouse ──────────────────────────────────────
    # Cursor sensitivity (-1.0 to 1.0, where 0 = no adjustment).
    # Combined with accel_profile, this is your effective mouse speed.
    sensitivity = 0.0

    # Acceleration profile:
    #   flat    = no acceleration (raw 1:1 input — best for gaming/precision)
    #   adaptive = libinput's default acceleration curve
    #   custom  = define your own curve (advanced)
    accel_profile = flat

    # Left-hand mouse (swap buttons): true/false
    left_handed = false

    # Scroll method:
    #   2fg = two-finger scroll (touchpad default)
    #   edge = scroll by moving along the edge
    #   on_button_down = scroll when a button is held
    #   no_scroll = disable scroll
    scroll_method = 2fg

    # Reverse scroll direction for mice (not touchpad — touchpad has its own).
    # true = "natural" scroll (content follows finger direction)
    natural_scroll = true

    # Number of pixels the cursor must move before a window drag begins.
    # drag_threshold = 5

    # ── Touchpad ───────────────────────────────────
    touchpad {
        # Natural scroll — content moves in the direction of your fingers.
        # This is the macOS-style scroll. Set false for Windows-style.
        natural_scroll = true

        # Tap-to-click — single finger tap = left click.
        tap-to-click = true

        # Tap-to-drag — tap and hold, then move to drag.
        tap-and-drag = true

        # Drag lock — lift and re-place finger without ending a drag.
        drag_lock = false

        # Disable touchpad while typing to prevent accidental taps.
        disable_while_typing = true

        # Scroll factor — multiplier on touchpad scroll speed.
        # 1.0 = default speed. 0.8 = slower. 1.5 = faster.
        scroll_factor = 0.8

        # Middle click emulation — 3-finger tap = middle click.
        middle_button_emulation = false

        # Clickfinger behaviour:
        #   0 = use button areas (bottom-left = left, bottom-right = right)
        #   1 = clickfinger (1 finger = left, 2 fingers = right, 3 = middle)
        clickfinger_behavior = false
    }
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GESTURES
# https://wiki.hyprland.org/Configuring/Variables/#gestures
# Touchpad swipe gestures for workspace navigation.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

gestures {
    # Enable 3-finger horizontal swipe to switch workspaces.
    # workspace_swipe = true

    # Number of fingers for workspace swipe. 3 or 4.
    # workspace_swipe_fingers = 3

    gesture = 3, horizontal, workspace

    gesture = 3, up, fullscreen

    gesture = 2, pinchout, float, float
    gesture = 2, pinchin, float, tile

    # Distance in pixels that triggers a workspace switch.
    workspace_swipe_distance = 300

    # Invert the swipe direction (swipe left → next workspace instead of prev).
    workspace_swipe_invert = true

    # Minimum finger speed (px/s) to force a workspace switch even if
    # the swipe_distance threshold wasn't met. Set 0 to disable.
    workspace_swipe_min_speed_to_force = 30

    # If you swipe back more than this fraction of the way, cancel the switch.
    # 0.5 = swipe back halfway to cancel. 0.3 = easier to cancel.
    workspace_swipe_cancel_ratio = 0.5

    # Create new workspaces at the end when swiping past the last one.
    workspace_swipe_create_new = false

    # After a swipe, don't jump to the "permanent" workspace but stay on
    # the newly switched one. Feels more natural.
    workspace_swipe_forever = false

    # Use absolute scroll position instead of relative (experimental).
    # workspace_swipe_use_r = false
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEVICE-SPECIFIC OVERRIDES
# https://wiki.hyprland.org/Configuring/Variables/#per-device-input-config
#
# Override input settings for a specific device only.
# Use `hyprctl devices` to list device names.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Example: Apply different sensitivity to a specific gaming mouse
# device {
#     name = logitech-g502-hero
#     sensitivity = -0.5
#     accel_profile = flat
# }

# Example: External keyboard with different layout
# device {
#     name = das-keyboard-model-s
#     kb_layout = us
#     kb_options = caps:escape
# }

# Example: Disable touchpad when external mouse is connected
# (handled better via a udev rule or a script, but can be toggled here)
# device {
#     name = elan-touchpad
#     enabled = true
# }
