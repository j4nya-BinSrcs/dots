# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/layouts.conf                    ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Configure tiling layout engines.                  ║
# ║            The Dots uses Dwindle as default with Master       ║
# ║            available as a toggle.                            ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Dwindle-Layout/  ║
# ║            https://wiki.hyprland.org/Configuring/Master-Layout/   ║
# ╚══════════════════════════════════════════════════════════════╝
#
# LAYOUT OVERVIEW:
#
#   Dwindle — Binary Space Partitioning (BSP).
#     Each new window splits the focused window's space in half.
#     Very common in tiling WMs (similar to i3/bspwm).
#     Good for: general use, code + browser side by side.
#
#   Master — One large "master" area + a stack of smaller "slave" windows.
#     Similar to DWM or XMonad's default layout.
#     Good for: focused work with reference windows on the side.
#
# SWITCHING LAYOUTS:
#   hyprctl keyword general:layout dwindle
#   hyprctl keyword general:layout master
#   (see binds.conf for the keybind to toggle)
# ─────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DWINDLE LAYOUT
# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

dwindle {
    # Pseudotile — windows maintain their floating size and position when
    # "tiled", snapping to the tile grid but not filling the full tile.
    # Toggle per-window with $mod + P (see binds.conf).
    pseudotile = false

    # Preserve the split direction when a window is closed or swapped.
    # Without this, windows rearrange in unpredictable ways.
    preserve_split = true

    # Force a split direction for new windows:
    #   0 = split based on the longer edge of the focused tile (automatic)
    #   1 = always split to the right (vertical split line)
    #   2 = always split downward (horizontal split line)
    force_split = 0

    # Special split ratio preservation.
    # If true, overrides the default 0.5 ratio when splitting to preserve
    # the existing proportions of adjacent tiles.
    smart_split = false

    # Smart resizing: when resizing a tiled window, only resize toward
    # the side where there's adjacent empty space. Feels more natural.
    smart_resizing = true

    # Permanent direction override (0=off):
    #   Normally Hyprland alternates split direction.
    #   Set to a direction (e.g. "left") to lock it.
    # permanent_direction_override = false

    # Set the default split ratio (how much space a new window takes).
    # 1.0 = equal split. Values between 0.1 and 1.9.
    default_split_ratio = 1.0

    # Use a no-gaps workspace when only one window is open.
    # Equivalent to turning off gaps when there's nothing to separate.
    use_active_for_splits = true
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MASTER LAYOUT
# https://wiki.hyprland.org/Configuring/Master-Layout/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

master {
    # Where new windows go by default.
    # "slave"  = new windows go into the stack (right/bottom area)
    # "master" = new windows replace the master and push the old master to stack
    new_status = slave

    # Master area size as a fraction of the monitor.
    # 0.55 = master takes 55%, stack takes 45%.
    mfact = 0.55

    # Which side the master area appears on.
    # Options: left, right, top, bottom
    orientation = left

    # Inherit the "fullscreen" state for the master when there's only 1 window.
    # True = a single window fills the screen like maximize.
    # inherit_fullscreen = true

    # Center the master window when it's the only one on screen.
    # always_center_master = false

    # Drop split strategy:
    # 0 = default (no cycling), 1 = cycle through positions
    drop_at_cursor = true

    # Always keep the master area, even when there are no slave windows.
    # False = master takes full screen when it's the only window.
    allow_small_split = false

    # How much to scale each subsequent slave window.
    # 1.0 = all slaves equal size. 0.9 = each slave slightly smaller.
    slave_count_for_center_master = 2
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WORKSPACE RULES
# https://wiki.hyprland.org/Configuring/Workspace-Rules/
# Fine-grained rules per workspace — layout, gaps, etc.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Workspace 1 (Terminal/Code) — dwindle, normal gaps
workspace = 1, layoutopt:orientation:right

# Workspace 2 (Browser) — maximize browser, no need for tiling gaps
workspace = 2, layoutopt:orientation:right

# Workspace 4 (Gaming) — maximize everything, no gaps, no borders
workspace = 4, gapsin:0, gapsout:0, bordersize:0, decorate:false

# Workspace 5 (Media) — same treatment as gaming for full immersion
workspace = 5, gapsin:0, gapsout:0, bordersize:0, decorate:false

# Special workspace (scratchpad) — always float, specific size
workspace = special:magic, gapsin:10, gapsout:20
