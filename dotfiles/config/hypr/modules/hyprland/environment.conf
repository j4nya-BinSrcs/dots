# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/environment.conf                ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Set environment variables for the Hyprland        ║
# ║            session. These propagate to all launched apps.    ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Environment-variables/ ║
# ╚══════════════════════════════════════════════════════════════╝
#
# NOTE: Variables set here only apply to apps launched THROUGH
# Hyprland (i.e. from your keybinds or exec-once). For system-wide
# variables, also set them in /etc/environment or ~/.profile.
#
# Format: env = VARIABLE_NAME, value
# ─────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# XDG BASE DIRECTORIES
# https://specifications.freedesktop.org/basedir-spec/latest/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Declares this as a Wayland session — many apps check this to
# decide which backend to use (Wayland vs X11 fallback).
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_CURRENT_DESKTOP, Hyprland


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WAYLAND BACKENDS
# Forces toolkits to use native Wayland rendering.
# Native Wayland = better performance, proper scaling, no blurry XWayland.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Qt5 / Qt6 — use Wayland, fall back to xcb (X11) only if Wayland fails.
# https://doc.qt.io/qt-6/qpa.html
env = QT_QPA_PLATFORM, wayland;xcb

# Disable Qt's own client-side window decorations on Wayland —
# Hyprland draws borders itself, so this avoids a double-border issue.
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1

# Let Qt auto-scale UI based on monitor DPI.
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# Qt theme engine — qt6ct lets you configure Qt app appearance (fonts, colors).
# Run `qt6ct` to configure. Requires qt6ct package.
env = QT_QPA_PLATFORMTHEME, qt6ct

# GTK apps on Wayland — use the native Wayland GDK backend.
# Prevents GTK apps from rendering through XWayland unnecessarily.
env = GDK_BACKEND, wayland,x11,*

# Firefox / Zen Browser — enable native Wayland rendering.
# Without this, Firefox uses XWayland and loses fractional scaling support.
# https://wiki.archlinux.org/title/Firefox#Wayland
env = MOZ_ENABLE_WAYLAND, 1

# Electron apps (Discord, VS Code, etc.) — enable Wayland via Ozone platform.
# Pass --ozone-platform=wayland as a flag in app .desktop files for per-app control.
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# SDL2 games and apps — prefer Wayland.
# Falls back to x11 if Wayland isn't available (e.g. running from TTY).
# https://wiki.libsdl.org/SDL2/FAQUsingSDL
env = SDL_VIDEODRIVER, wayland,x11

# Clutter (used by some GNOME apps) — use Wayland backend.
env = CLUTTER_BACKEND, wayland


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CURSOR
# https://wiki.hyprland.org/Configuring/Environment-variables/#cursor-variables
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# XCursor — for X11/XWayland apps
# Bibata-Modern-Classic: clean, minimal, professional. Install: bibata-cursor-theme
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE, 24

# Hyprcursor — Hyprland's native cursor protocol (higher quality scaling)
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprcursor/
env = HYPRCURSOR_THEME, Bibata-Modern-Classic
env = HYPRCURSOR_SIZE, 24


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GRAPHICS / GPU
# https://wiki.hyprland.org/Configuring/Environment-variables/#nvidia-specific
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── NVIDIA (uncomment if you have an NVIDIA GPU) ─
# env = LIBVA_DRIVER_NAME, nvidia
# env = __GLX_VENDOR_LIBRARY_NAME, nvidia
# env = NVD_BACKEND, direct          # Use direct rendering for nvidia-vaapi-driver
# env = __GL_GSYNC_ALLOWED, 1        # Allow G-Sync (if monitor supports it)
# env = __GL_VRR_ALLOWED, 1          # Allow VRR/FreeSync on NVIDIA
# env = GBM_BACKEND, nvidia-drm      # Use nvidia DRM for GBM (may break some apps)

# ── AMD / Intel (usually no extra env needed) ─────
# RADV (AMD open-source Vulkan) — set preferred GPU for multi-GPU systems:
# env = DRI_PRIME, 1


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# THEMING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# GTK theme — set to your chosen theme name.
# See ~/.config/gtk-3.0/settings.ini and nwg-look for GUI configuration.
env = GTK_THEME, Catppuccin-Mocha-Standard-Mauve-Dark

# Icon theme
env = ICON_THEME, Papirus-Dark


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# TOOLKIT / ACCESSIBILITY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Disable the accessibility bus warning that many GTK apps spit out.
# Set to 1 only if you actually need accessibility tools (screen readers, etc.)
env = NO_AT_BRIDGE, 1

# Java apps (e.g. JetBrains IDEs) — tell them they're running on a non-reparenting WM.
# Without this, Java Swing apps may render blank windows.
env = _JAVA_AWT_WM_NONREPARENTING, 1

# ozone-platform for some apps that check this env directly
env = OZONE_PLATFORM, wayland
