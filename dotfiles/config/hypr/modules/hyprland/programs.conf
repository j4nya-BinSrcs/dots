# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/programs.conf                   ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Declare all program variables used across the     ║
# ║            config. Change your apps here — one place,        ║
# ║            reflected everywhere.                             ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Keywords/   ║
# ╚══════════════════════════════════════════════════════════════╝


# ── Terminal ──────────────────────────────────────────────────────
# Primary terminal emulator.
# Ghostty: https://ghostty.org — GPU-accelerated, feature-rich.
# Alternatives: kitty, alacritty, wezterm, foot
$terminal = ghostty

# Fallback terminal (used in scripts when $terminal might not be ready)
$terminal_fallback = kitty

# ── Browser ───────────────────────────────────────────────────────
# Zen Browser: Firefox-based, privacy-first, beautiful UI.
# Alternatives: firefox, chromium, brave, thorium
$browser = zen-browser

# ── File Manager ──────────────────────────────────────────────────
# yazi: blazing-fast TUI file manager written in Rust.
# Launched inside the terminal. https://yazi-rs.github.io
# GUI alternative: thunar, nautilus, dolphin
$filemanager = yazi
$filemanager_gui = thunar

# ── App Launcher ──────────────────────────────────────────────────
# rofi-wayland: Wayland-native fork of rofi.
# -show drun = show desktop applications
# -show-icons = show app icons in the launcher
$launcher = rofi -show drun -show-icons

# rofi as a run prompt (raw binary execution)
$run_prompt = rofi -show run

# rofi as a window switcher (switch between open windows)
$window_switcher = rofi -show window -show-icons

# ── Clipboard ─────────────────────────────────────────────────────
# cliphist: wayland clipboard manager with history.
# Pipes cliphist list into rofi, then decodes and copies the selection.
$clipboard = cliphist list | rofi -dmenu -p " Clipboard" | cliphist decode | wl-copy

# ── Lock Screen ───────────────────────────────────────────────────
# hyprlock: native Hyprland lock screen.
# Config: ~/.config/hypr/hyprlock.conf
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/
$lockscreen = hyprlock

# ── Power / Session Menu ──────────────────────────────────────────
# wlogout: a clean Wayland logout/power menu.
# Config: ~/.config/wlogout/
$powermenu = wlogout

# ── Notifications ─────────────────────────────────────────────────
# swaync-client: CLI controller for SwayNotificationCenter.
# -t = toggle the notification panel open/closed
# -d = toggle do-not-disturb
$notif_toggle = swaync-client -t
$notif_dnd = swaync-client -d

# ── Screenshots ───────────────────────────────────────────────────
# grimblast: wrapper around grim + slurp for easy Hyprland screenshots.
# https://github.com/hyprwm/contrib/tree/main/grimblast
$screenshot_region = grimblast copy area
$screenshot_screen = grimblast copy screen
$screenshot_save = grimblast save area ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
$screenshot_save_screen = grimblast save screen ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Color Picker ─────────────────────────────────────────────────
# hyprpicker: pick a color from anywhere on screen, copies hex to clipboard.
# https://github.com/hyprwm/hyprpicker
$colorpicker = hyprpicker -a

# ── Editor ────────────────────────────────────────────────────────
# Neovim launched in terminal for TUI editing.
# Replace with zed, code, etc. for GUI editors.
$editor = $terminal -e nvim
$editor_gui = zed

# ── System Monitor ────────────────────────────────────────────────
# btop: beautiful, feature-rich TUI resource monitor.
# https://github.com/aristocratos/btop
$sysmon = $terminal -e btop
$sysmon_gui = missioncenter

# ── Music / Media ─────────────────────────────────────────────────
$music = $terminal -e ncspot
$mediaplayer = mpv

# ── Calculator ────────────────────────────────────────────────────
$calculator = qalculate-gtk
