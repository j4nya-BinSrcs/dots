# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/startup.conf                    ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Autostart daemons and services on Hyprland boot.  ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Keywords/#executing ║
# ╚══════════════════════════════════════════════════════════════╝
#
# KEYWORDS:
#   exec-once = runs the command ONCE on startup (or after `hyprctl reload`
#               if the process is not already running — use for daemons).
#   exec       = runs EVERY TIME the config is reloaded. Avoid for daemons
#               as it will spawn duplicate processes.
#
# ORDER MATTERS:
#   Portals and D-Bus must be ready before apps that depend on them.
#   Wallpaper should start early so there's no blank screen flash.
# ─────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. SYSTEM SERVICES (start first — other apps depend on these)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# D-Bus environment propagation.
# Makes WAYLAND_DISPLAY and XDG_CURRENT_DESKTOP available to systemd user
# services and D-Bus activated services. Required for screen sharing, portals,
# and any app that uses D-Bus to discover the desktop environment.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

# XDG Desktop Portal — Hyprland backend.
# Required for: screen capture (OBS, Discord), file pickers, app sandboxing.
# https://wiki.hyprland.org/Useful-Utilities/xdg-desktop-portal-hyprland/
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = systemctl --user start xdg-desktop-portal

# GNOME Keyring — stores passwords, SSH keys, and secrets.
# Required for: browser password sync, SSH agent, libsecret apps.
exec-once = /usr/lib/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh

# Polkit agent — handles privilege escalation GUI prompts.
# Without this, apps that need sudo (e.g. package managers with GUI) won't work.
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprpolkitagent/
exec-once = /usr/lib/hyprpolkitagent

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. DISPLAY (wallpaper early to avoid blank screen)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# swww — smooth GPU-accelerated wallpaper daemon.
# We start the daemon first, then set the wallpaper.
# Transition: grow from center over 1.5 seconds.
# https://github.com/LGFae/swww
exec-once = swww-daemon
exec-once = sleep 0.5 && swww img ~/.config/hypr/wallpaper.jpg \
    --transition-type grow \
    --transition-duration 1.5 \
    --transition-fps 60 \
    --transition-bezier 0.4,0.0,0.2,1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. BAR & UI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Waybar — status bar.
# Config: ~/.config/waybar/config.jsonc and style.css
# https://github.com/Alexays/Waybar
exec-once = waybar

# SwayNotificationCenter — notifications + notification drawer.
# Config: ~/.config/swaync/
# https://github.com/ErikReider/SwayNotificationCenter
exec-once = swaync

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4. IDLE & LOCK
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# hypridle — idle daemon that triggers screen dim/lock/suspend.
# Config: ~/.config/hypr/hypridle.conf
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/
exec-once = hypridle

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 5. CLIPBOARD
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# cliphist — clipboard history daemon.
# wl-paste watches the clipboard and pipes new entries into cliphist.
# Two watchers: one for text, one for images (handles both types).
# https://github.com/sentriz/cliphist
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 6. NETWORKING & SYSTEM TRAY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# NetworkManager applet — system tray icon for network management.
# Provides GUI for connecting to WiFi, editing connections, etc.
exec-once = nm-applet --indicator

# Bluetooth manager (uncomment if you use Bluetooth)
# exec-once = blueman-applet

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 7. INPUT METHOD (uncomment if needed)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# fcitx5 — input method framework (for CJK, Arabic, etc.)
# exec-once = fcitx5 -d

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 8. THEMING (apply GTK/cursor theme at startup)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Apply the cursor theme to the root (XWayland) window.
# Without this, XWayland apps use the default X cursor instead of your theme.
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Apply GTK settings from gsettings (reads ~/.config/gtk-3.0/settings.ini)
# This ensures GTK apps pick up the correct theme even without a login manager.
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Bibata-Modern-Classic"
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Catppuccin-Mocha-Standard-Mauve-Dark"
exec-once = gsettings set org.gnome.desktop.interface font-name "JetBrainsMono Nerd Font 11"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 9. OPTIONAL / PERSONAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Start SSH agent (if not handled by gnome-keyring)
# exec-once = eval $(ssh-agent -s)

# Auto-mount removable media
# exec-once = udiskie --tray

# eww widgets (uncomment when you have eww configured)
# exec-once = eww daemon && eww open bar
