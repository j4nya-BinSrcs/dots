# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/binds.conf                      ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : All keyboard and mouse bindings.                  ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Binds/      ║
# ╚══════════════════════════════════════════════════════════════╝
#
# BIND TYPES:
#   bind   = standard bind — fires once on key press
#   binde  = repeating bind — fires repeatedly while held (good for resize/volume)
#   bindm  = mouse bind — for mouse button + modifier combos
#   bindl  = locked bind — fires even when the screen is locked
#   bindr  = fires on key RELEASE instead of press
#   bindn  = non-consuming bind — doesn't consume the keypress (passes it through)
#
# FORMAT:
#   bind = MODIFIER, KEY, dispatcher, [args]
#   bind = MODIFIER, KEY, exec, command
#
# MODIFIERS:
#   SUPER, SHIFT, CTRL, ALT, HYPER, META
#   Combine with: SUPER SHIFT, SUPER CTRL, etc.
#
# KEY NAMES:
#   https://wiki.hyprland.org/Configuring/Binds/#uncommon-key-names
#   Use `wev` or `xev` to find key names for special keys.
#
# DISPATCHERS:
#   https://wiki.hyprland.org/Configuring/Dispatchers/
# ─────────────────────────────────────────────────────────────────

# ── Modifier key ──────────────────────────────────────────────────
$mod = SUPER


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# APPLICATIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Terminal
bind = $mod,       RETURN, exec, $terminal
bind = $mod SHIFT, RETURN, exec, $terminal_fallback

# Browser
bind = $mod,       B,      exec, $browser

# App launcher (Rofi — desktop apps)
bind = $mod,       A,      exec, $launcher

# App launcher (Rofi — raw binary run prompt)
bind = $mod SHIFT, A,      exec, $run_prompt

# Window switcher (Rofi — switch between open windows)
bind = $mod,       TAB,    exec, $window_switcher

# File manager (TUI in terminal)
bind = $mod,       E,      exec, $terminal -e $filemanager

# File manager (GUI)
bind = $mod SHIFT, E,      exec, $filemanager_gui

# Text editor (GUI)
bind = $mod,       code:60, exec, $editor_gui   # $mod + . (period)

# System monitor
bind = $mod,       semicolon, exec, $sysmon

# Calculator
bind = $mod,       C,      exec, $calculator

# Color picker — copies hex code to clipboard
bind = $mod SHIFT, C,      exec, $colorpicker


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SESSION & SYSTEM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Close focused window
bind = $mod,       Q,      killactive

# Force-kill a window (for frozen apps — like Alt+F4 but nuclear)
bind = $mod SHIFT, Q,      exec, hyprctl kill

# Exit Hyprland completely (will drop you to TTY or greeter)
bind = $mod SHIFT, ESCAPE, exit

# Lock screen
bind = $mod,       L,      exec, $lockscreen

# Power menu (wlogout)
bind = $mod SHIFT, L,      exec, $powermenu

# Reload Hyprland config without restarting
bind = $mod SHIFT, R,      exec, hyprctl reload && notify-send "Hyprland" "Config reloaded" -i preferences-system

# Toggle notification center
bind = $mod,       N,      exec, $notif_toggle

# Toggle Do Not Disturb
bind = $mod SHIFT, N,      exec, $notif_dnd

# Clipboard history picker
bind = $mod,       V,      exec, $clipboard


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WINDOW MANAGEMENT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Toggle floating on focused window
bind = $mod,       SPACE,  togglefloating

# Toggle fullscreen (real — hides bar and gaps)
bind = $mod,       F,      fullscreen, 0

# Toggle fake fullscreen (window fills its tile, bar still visible)
bind = $mod SHIFT, F,      fullscreen, 1

# Toggle maximize (pseudo-fullscreen without hiding bar)
bind = $mod,       M,      fullscreen, 1

# Toggle pseudotile (floating size snapped to grid)
bind = $mod,       P,      pseudo

# Toggle split (dwindle: swap between horizontal/vertical split)
bind = $mod,       J,      togglesplit

# Pin a floating window on top of all others (always-on-top)
bind = $mod SHIFT, P,      pin

# Center a floating window on the screen
bind = $mod,       Z,      centerwindow

# Swap focused window with the master window (master layout)
bind = $mod SHIFT, M,      layoutmsg, swapwithmaster

# Cycle windows in the current workspace (forward/back)
bind = $mod,       comma,      cyclenext
bind = $mod,       period,     cyclenext, prev

# ── Window Focus (vim-style + arrow keys) ─────────
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ── Window Movement ───────────────────────────────
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Window Resize (hold key for continuous resize) ──
# binde = fires repeatedly while held
binde = $mod CTRL, H,     resizeactive, -30 0
binde = $mod CTRL, L,     resizeactive,  30 0
binde = $mod CTRL, K,     resizeactive,  0 -30
binde = $mod CTRL, J,     resizeactive,  0  30
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, right, resizeactive,  30 0
binde = $mod CTRL, up,    resizeactive,  0 -30
binde = $mod CTRL, down,  resizeactive,  0  30

# ── Mouse: Move & Resize windows ─────────────────
# bindm uses mouse buttons: 272 = left, 273 = right, 274 = middle
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Move floating windows to edges ───────────────
# Snap a floating window to a screen edge/corner
bind = $mod CTRL SHIFT, H,    moveactive, -50 0
bind = $mod CTRL SHIFT, L,    moveactive,  50 0
bind = $mod CTRL SHIFT, K,    moveactive,  0 -50
bind = $mod CTRL SHIFT, J,    moveactive,  0  50


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WORKSPACES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Switch to workspace 1–10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move focused window to workspace 1–10 (and follow it)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move focused window to workspace silently (don't switch to it)
bind = $mod CTRL, 1, movetoworkspacesilent, 1
bind = $mod CTRL, 2, movetoworkspacesilent, 2
bind = $mod CTRL, 3, movetoworkspacesilent, 3
bind = $mod CTRL, 4, movetoworkspacesilent, 4
bind = $mod CTRL, 5, movetoworkspacesilent, 5
bind = $mod CTRL, 6, movetoworkspacesilent, 6
bind = $mod CTRL, 7, movetoworkspacesilent, 7
bind = $mod CTRL, 8, movetoworkspacesilent, 8
bind = $mod CTRL, 9, movetoworkspacesilent, 9
bind = $mod CTRL, 0, movetoworkspacesilent, 10

# Navigate workspaces — next / previous
bind = $mod ALT, right,     workspace, e+1
bind = $mod ALT, left,      workspace, e-1
bind = $mod,     mouse_up,  workspace, e+1
bind = $mod,     mouse_down,workspace, e-1

# Go back to the previously active workspace (toggle between two)
bind = $mod, grave, workspace, previous

# ── Special Workspace (Scratchpad) ────────────────
# A hidden workspace that slides in/out like a dropdown.
# Great for a persistent terminal, music player, notes etc.
bind = $mod,       minus, togglespecialworkspace, magic
bind = $mod SHIFT, minus, movetoworkspace, special:magic


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SCREENSHOTS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Region screenshot → clipboard
bind = $mod,       S,     exec, $screenshot_region

# Region screenshot → saved to ~/Pictures/Screenshots/
bind = $mod SHIFT, S,     exec, $screenshot_save

# Full screen → clipboard
bind = ,          Print,  exec, $screenshot_screen

# Full screen → file
bind = SHIFT,     Print,  exec, $screenshot_save_screen

# Screenshot focused window only
bind = $mod CTRL, S,      exec, grimblast copy active


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MEDIA & AUDIO
# bindl = works even when screen is locked (for media keys)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Volume — wpctl (PipeWire/WirePlumber)
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media controls — playerctl (works with Spotify, mpv, browsers, etc.)
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioPause,        exec, playerctl pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous
bindl = , XF86AudioStop,         exec, playerctl stop

# Brightness — brightnessctl
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Keyboard backlight (if your keyboard supports it)
binde = , XF86KbdBrightnessUp,   exec, brightnessctl --device='*::kbd_backlight' set 5%+
binde = , XF86KbdBrightnessDown, exec, brightnessctl --device='*::kbd_backlight' set 5%-


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LAYOUT CONTROL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Toggle between dwindle and master layout
bind = $mod ALT, space, exec, \
    if hyprctl getoption general:layout | grep -q dwindle; then \
        hyprctl keyword general:layout master && notify-send "Layout" "Master" -i preferences-system; \
    else \
        hyprctl keyword general:layout dwindle && notify-send "Layout" "Dwindle" -i preferences-system; \
    fi

# Master layout — promote focused window to master
bind = $mod, RETURN, layoutmsg, swapwithmaster

# Increase/decrease master area size
binde = $mod ALT, H, splitratio, -0.05
binde = $mod ALT, L, splitratio, +0.05
