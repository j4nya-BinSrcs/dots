# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GENERAL — Gaps, Borders, Layout
# https://wiki.hyprland.org/Configuring/Variables/#general
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    # Inner gap: space between tiled windows (pixels)
    gaps_in = 5

    # Outer gap: space between windows and screen edges (pixels)
    gaps_out = 10

    # Border thickness in pixels.
    # 2px = sharp, professional. 0 = borderless. 3+ = more prominent.
    border_size = 2

    # Active window border — solid Catppuccin Mauve.
    # rgba() format: RRGGBBAA (AA = alpha, ff = fully opaque)
    col.active_border = rgba(cba6f7ff)

    # Inactive window border — Surface0 at 0% opacity (invisible).
    # Keeping it transparent means only the focused window has a visible border,
    # which creates a strong focal point without visual noise.
    col.inactive_border = rgba(31324400)

    # Allow resizing windows by clicking and dragging on their border.
    # Eliminates the need to find a tiny resize handle.
    resize_on_border = true

    # Extra pixels around the border that count as "on the border" for resizing.
    # Makes border grabbing more forgiving.
    extend_border_grab_area = 10

    # Hover to resize cursor — shows a resize cursor when hovering the border.
    hover_icon_on_border = true

    # Allow tearing for apps/games that request it.
    # Reduces input latency in fullscreen at the cost of potential screen tear.
    # Set to true if you game. Per-window control via windowrule:
    #   windowrulev2 = immediate, class:^(gamename)$
    allow_tearing = false

    # Default tiling layout. Options: dwindle, master
    # Switched between via keybind in binds.conf
    layout = dwindle
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DECORATION — Rounding, Blur, Shadow, Opacity
# https://wiki.hyprland.org/Configuring/Variables/#decoration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

decoration {
    # Window corner rounding radius (pixels).
    # 8 = modern, clean. 0 = sharp/brutalist. 12+ = soft/bubbly.
    rounding = 8

    # Rounding on windows with full-size border (used when no border specified)
    rounding_power = 2.0

    # ── Opacity ────────────────────────────────────
    # Base opacity for active (focused) windows. 1.0 = fully opaque.
    active_opacity = 1.0

    # Slight dimming on inactive windows to emphasize focus.
    # 0.95 = subtle, barely noticeable. 0.8 = aggressive dimming.
    inactive_opacity = 0.95

    # Fullscreen windows ignore opacity settings — always fully opaque.
    fullscreen_opacity = 1.0

    # ── Shadows ────────────────────────────────────
    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = true

        # Shadow render range in pixels — how far the shadow extends.
        range = 25

        # Render power: 1=sharp falloff, 4=very soft. 3 is a good balance.
        render_power = 3

        # Shadow offset: shift the shadow (x y) in pixels.
        # Small downward offset (0, 4) mimics natural overhead light.
        # offset_x = 0
        # offset_y = 4

        # Shadow color — Base with ~75% opacity. Dark but not pure black.
        color = rgba(1e1e2ebf)

        # Shadow color for inactive windows — even more subtle.
        color_inactive = rgba(1e1e2e66)
    }

    # ── Blur ───────────────────────────────────────
    # Applied to transparent surfaces: Waybar, Rofi, swaync, etc.
    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true

        # Blur kernel size. Must be odd. Higher = more blur.
        # 6–8 is a good balance of quality vs performance.
        size = 8

        # Number of blur passes. More passes = smoother, more expensive.
        # 3 is the sweet spot. Don't go above 5.
        passes = 3

        # New optimizations — use GPU-accelerated blur path. Almost always faster.
        new_optimizations = true

        # Ignore the opacity of the window itself when blurring.
        # Lets blur work on surfaces with opacity = 0 (fully transparent BG).
        ignore_opacity = true

        # Vibrancy: subtle color enhancement on blurred surfaces.
        # 0 = none, 0.1696 = Hyprland default, 1.0 = vivid
        vibrancy = 0.15

        # Vibrancy darkness: how much vibrancy affects darker parts of the blur.
        vibrancy_darkness = 0.5

        # Blur the special workspace (scratchpad) background.
        special = true

        # Blur popups (context menus, tooltips, etc.).
        popups = true

        # Contrast adjustment on blurred surfaces.
        contrast = 1.0

        # Brightness adjustment on blurred surfaces.
        brightness = 0.85

        # Noise amount for a subtle film grain effect on blur.
        # Prevents banding. 0 = none, 0.05 = subtle texture.
        noise = 0.02
    }
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ANIMATIONS
# https://wiki.hyprland.org/Configuring/Animations/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# BEZIER CURVES:
#   Format: bezier = <name>, x1, y1, x2, y2
#   These are cubic bezier control points — same as CSS animations.
#   Visualize at: https://cubic-bezier.com
#   Or: https://www.cssportal.com/css-cubic-bezier-generator/
#
# ANIMATION FORMAT:
#   animation = <event>, <enabled 0|1>, <speed>, <bezier>, [style]
#   Speed: duration in 100ms units. speed=5 → 500ms. speed=2 → 200ms.
#
# EVENTS:
#   windows, windowsIn, windowsOut, windowsMove
#   workspaces, specialWorkspace
#   layers, layersIn, layersOut
#   fade, fadeIn, fadeOut, fadeSwitch, fadeShadow, fadeDim
#   border, borderangle
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

animations {
    enabled = true

    # ── Bezier curves ──────────────────────────────

    # overshot — fast start, slight overshoot then settle.
    # Used for window open. Feels confident and snappy.
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    # overshootOut — mirrored overshoot for closing.
    bezier = overshootOut, 0.9, 0.05, 1.0, 0.1

    # smoothOut — decelerates, comes to a soft stop. Good for fades.
    bezier = smoothOut, 0.36, 0, 0.66, -0.56

    # smoothIn — accelerates then abrupt stop. Used for window close.
    bezier = smoothIn, 0.25, 1, 0.5, 1

    # fluid — smooth, natural feel for workspace switches.
    bezier = fluid, 0.4, 0.0, 0.2, 1.0

    # linear — constant speed. Best for border color transitions.
    bezier = linear, 0, 0, 1, 1

    # snap — very fast, almost instant. For UI elements that should be immediate.
    bezier = snap, 0.19, 1, 0.22, 1

    # ── Window animations ──────────────────────────

    # Window open: slide in with an overshoot — feels alive and premium.
    animation = windowsIn,   1, 5, overshot, slide

    # Window close: slide out fast — you want it gone, not a ceremony.
    animation = windowsOut,  1, 3, smoothIn, slide

    # Window move/resize: smooth repositioning with fluid easing.
    animation = windowsMove, 1, 4, fluid, slide

    # ── Workspace animations ───────────────────────

    # Workspace switch: horizontal slide with fluid easing.
    # style options: slide, slidevert, fade, slidefade, slidefadevert
    animation = workspaces,       1, 4, fluid, slide

    # Special workspace (scratchpad): slides up/down from below.
    animation = specialWorkspace, 1, 4, fluid, slidevert

    # ── Fade animations ────────────────────────────

    # General fade in (windows/layers appearing)
    animation = fadeIn,     1, 4, smoothIn

    # General fade out (windows/layers disappearing)
    animation = fadeOut,    1, 3, smoothOut

    # Fade when switching window focus
    animation = fadeSwitch, 1, 4, fluid

    # Shadow fade — how quickly shadows appear/disappear
    animation = fadeShadow, 1, 4, fluid

    # Dim fade — how quickly inactive window dim transitions
    animation = fadeDim,    1, 4, fluid

    # ── Layer animations ───────────────────────────
    # Layers = non-window surfaces: Waybar, Rofi, swaync, hyprlock etc.

    animation = layers,    1, 3, fluid, fade
    animation = layersIn,  1, 3, overshot, fade
    animation = layersOut, 1, 2, smoothOut, fade

    # ── Border animations ──────────────────────────

    # Border color transition when focus changes.
    animation = border,      1, 8, fluid

    # Border angle animation — animates a gradient sweeping around the border.
    # Requires col.active_border to be a gradient (two colors) to be visible.
    # Example gradient: col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    # Set to 0 to disable (current config uses solid color, so this is off).
    animation = borderangle, 0, 8, linear, loop
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WINDOW RULES
# https://wiki.hyprland.org/Configuring/Window-Rules/
#
# TIP: Use `hyprctl clients` to find the class and title of any window.
# Or use `hyprctl activewindow` while a window is focused.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Float specific windows ────────────────────────
# These apps make no sense as tiled windows.
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(qalculate-gtk)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(qt5ct)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, class:^(kvantummanager)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$

# Float common dialog/popup titles
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Open Folder)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Rename)$
windowrulev2 = float, title:^(Confirm.*)$
windowrulev2 = float, title:^(Picture.in.Picture)$

# ── Sizing for floated windows ────────────────────
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = size 900 600, class:^(nm-connection-editor)$
windowrulev2 = size 700 500, class:^(blueman-manager)$

# ── Center floated windows ────────────────────────
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = center, class:^(qalculate-gtk)$
windowrulev2 = center, title:^(Open File)$
windowrulev2 = center, title:^(Save As)$

# ── Opacity ───────────────────────────────────────
# Format: opacity <active_opacity> override <inactive_opacity> override
# Terminal: slight transparency when inactive — creates depth.
windowrulev2 = opacity 1.0 override 0.92 override, class:^(ghostty)$
windowrulev2 = opacity 1.0 override 0.92 override, class:^(kitty)$

# ── Workspace assignments ─────────────────────────
# Apps auto-open on the right workspace. Stay organized from day one.
windowrulev2 = workspace 2 silent, class:^(firefox)$
windowrulev2 = workspace 2 silent, class:^(zen-browser)$
windowrulev2 = workspace 2 silent, class:^(chromium)$
windowrulev2 = workspace 3 silent, class:^(discord)$
windowrulev2 = workspace 3 silent, class:^(Slack)$
windowrulev2 = workspace 3 silent, class:^(org.telegram.desktop)$
windowrulev2 = workspace 4 silent, class:^(steam)$
windowrulev2 = workspace 4 silent, class:^(lutris)$
windowrulev2 = workspace 4 silent, class:^(heroic)$
windowrulev2 = workspace 5 silent, class:^(mpv)$
windowrulev2 = workspace 5 silent, class:^(vlc)$

# ── Fullscreen / Gaming ───────────────────────────
# Remove borders and animations from fullscreen — pure focus.
windowrulev2 = noborder, fullscreen:1
windowrulev2 = noanim, fullscreen:1

# Steam game windows: fullscreen immediately, no animation overhead.
windowrulev2 = fullscreen,         class:^(steam_app_.*)$
windowrulev2 = noanim,             class:^(steam_app_.*)$
windowrulev2 = noborder,           class:^(steam_app_.*)$
windowrulev2 = immediate,          class:^(steam_app_.*)$

# ── Layer rules ───────────────────────────────────
# https://wiki.hyprland.org/Configuring/Layer-Rules/
# These apply to non-window surfaces: bars, launchers, overlays.

# Blur the Waybar background
# layerrule = blur,       waybar
# layerrule = ignorezero, waybar

# Blur Rofi launcher
# layerrule = blur,       rofi
# layerrule = ignorezero, rofi

# Blur SwayNotificationCenter panel
# layerrule = blur,       swaync-control-center
# layerrule = ignorezero, swaync-control-center

# Blur individual notifications
# layerrule = blur,       swaync-notification-window
# layerrule = ignorezero, swaync-notification-window

# Animate wlogout (power menu)
# layerrule = animation fade, wlogout
