# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/monitors.conf                   ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Configure physical displays — resolution,         ║
# ║            refresh rate, position, scale, and transforms.    ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Monitors/   ║
# ╚══════════════════════════════════════════════════════════════╝
#
# USEFUL COMMANDS:
#   hyprctl monitors          — list all connected monitors with their names
#   hyprctl monitors all      — include disconnected monitors
#   wlr-randr                 — alternative display config tool
#
# FORMAT:
#   monitor = <name>, <resolution>@<hz>, <position>, <scale>
#
# POSITION:
#   Monitors are placed on a virtual canvas. 0x0 is the top-left origin.
#   For a dual monitor setup (left + right), set positions like:
#     monitor = DP-1, 1920x1080@144, 0x0, 1
#     monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1
#                                         ^^^^^ = width of first monitor
#
# SCALE:
#   1   = 100% (no scaling — standard for 1080p/1440p)
#   1.5 = 150% (common for 27" 4K displays)
#   2   = 200% (typical for HiDPI / Retina-style displays)
#   Fractional scaling (e.g. 1.25) requires: misc:xwayland_use_nearest_neighbor = false
#
# ─────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PRIMARY MONITOR
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# The comma-separated wildcard `monitor = ,` matches ANY monitor
# not matched by a more specific rule below. Using `preferred`
# tells Hyprland to auto-select the monitor's native res + refresh rate.
# `auto` for position places it automatically relative to other monitors.
# This is the safest default — replace with a specific rule once you know
# your monitor's connector name from `hyprctl monitors`.
monitor = , preferred, auto, 1


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SINGLE MONITOR — COMMON EXAMPLES
# Uncomment and edit the one that matches your setup.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# 1080p @ 144Hz on DP-1
# monitor = DP-1, 1920x1080@144, 0x0, 1

# 1440p @ 165Hz on DP-1
# monitor = DP-1, 2560x1440@165, 0x0, 1

# 4K @ 60Hz on HDMI with 1.5x scaling
# monitor = HDMI-A-1, 3840x2160@60, 0x0, 1.5

# Ultrawide 3440x1440 @ 144Hz
# monitor = DP-1, 3440x1440@144, 0x0, 1


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DUAL MONITOR — EXAMPLES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Side-by-side: primary left (DP-1), secondary right (HDMI-A-1)
# monitor = DP-1,    2560x1440@165, 0x0,    1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1

# Above/below: primary bottom, secondary on top
# monitor = DP-1,    1920x1080@144, 0x1080, 1
# monitor = HDMI-A-1, 1920x1080@60, 0x0,   1

# Laptop internal + external monitor (common setup)
# monitor = eDP-1,   2560x1600@120, 0x0,    1.5    # Laptop screen (HiDPI)
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1      # External


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MONITOR TRANSFORMS & MIRRORING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Transform values:
#   0 = normal
#   1 = 90°   clockwise
#   2 = 180°
#   3 = 270°  clockwise (= 90° counter-clockwise)
#   4–7 = flipped variants of the above
# Example: Vertical monitor (rotated 90° clockwise)
# monitor = DP-2, 1080x1920@60, 3840x0, 1, transform, 1

# Mirror DP-1 onto HDMI-A-1 (same content, useful for presentations)
# monitor = HDMI-A-1, preferred, auto, 1, mirror, DP-1


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WORKSPACE BINDING TO MONITORS
# Associates workspaces with specific monitors so they always
# live on the correct screen in a multi-monitor setup.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Primary monitor workspaces
workspace = 1,  monitor:DP-1, default:true
workspace = 2,  monitor:DP-1
workspace = 3,  monitor:DP-1
workspace = 4,  monitor:DP-1
workspace = 5,  monitor:DP-1

# Secondary monitor workspaces (uncomment for dual-monitor setups)
# workspace = 6,  monitor:HDMI-A-1, default:true
# workspace = 7,  monitor:HDMI-A-1
# workspace = 8,  monitor:HDMI-A-1
# workspace = 9,  monitor:HDMI-A-1
# workspace = 10, monitor:HDMI-A-1


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DISABLE A MONITOR
# Useful to temporarily turn off a screen via config
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# monitor = HDMI-A-1, disable
