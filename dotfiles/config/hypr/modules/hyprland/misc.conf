# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MISC
# https://wiki.hyprland.org/Configuring/Variables/#misc
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

misc {
    # Disable the default Hyprland background (anime girl wallpaper).
    # 0 = disable. 1 = show Hyprland logo. 2 = show gradient.
    force_default_wallpaper = 0

    # Disable the Hyprland logo rendered in the background.
    disable_hyprland_logo = true

    # Disable the "Hyprland" splash text shown at startup.
    disable_splash_rendering = true

    # Variable Refresh Rate (VRR / Adaptive Sync / FreeSync / G-Sync).
    # 0 = disabled
    # 1 = always on
    # 2 = fullscreen only (recommended — reduces VRR flicker on desktop)
    vrr = 2

    # Window swallowing — when you launch a GUI app from a terminal,
    # the terminal hides itself and reappears when the app closes.
    # Keeps the workspace clean. Only swallows $swallow_regex matches.
    enable_swallow = true

    # Regex of terminal class names that should be "swallowed".
    # Only these terminals will hide themselves when spawning a GUI child.
    swallow_regex = ^(ghostty|kitty|foot|alacritty)$

    # Also swallow when a floating app is spawned from a tiled terminal.
    swallow_exception_regex = ^(wev)$

    # Allow middle-click paste from primary selection (highlight-to-copy).
    # Set to false for a more Windows-like clipboard experience.
    middle_click_paste = true

    # Animate manual window resizes (dragging borders).
    animate_manual_resizes = true

    # Animate mouse cursor window moves.
    animate_mouse_windowdragging = true

    # When an app requests focus (e.g. via D-Bus), bring it to the front.
    focus_on_activate = true

    # Only allow focus requests if the app is on the active workspace.
    # Prevents annoying background apps from stealing focus.
    # no_focus_fallback = false

    # Render unfocused windows at this frame rate to save GPU/power.
    # 0 = no limit (render all windows at full rate).
    # 15 = render unfocused windows at max 15fps.
    render_unfocused_fps = 15

    # Mouse warping — warp the cursor to the center of a newly focused window.
    # true = cursor jumps to focused window. false = cursor stays where it is.
    mouse_move_focuses_monitor = true

    # Disable the new dispatcher warning in the log (reduces log spam).
    # suppress_portal_warnings = false

    # Hyprland will always move the cursor to the center of any newly
    # created floating window. Handy for dialog boxes.
    # initial_workspace_tracking = 1

    # Whether to close the special workspace when clicking elsewhere.
    close_special_on_empty = true

    # Whether key presses that hit a locked keybind are passed to the focused app.
    # false = locked binds consume the keypress entirely.
    # true = the app also receives the key event.
    allow_session_lock_restore = true
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# XWAYLAND
# https://wiki.hyprland.org/Configuring/Variables/#xwayland
# XWayland is a compatibility layer that lets X11 apps run under Wayland.
# It's required for apps that don't support native Wayland yet.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

xwayland {
    # Use nearest-neighbor scaling for XWayland apps.
    # true  = pixel-perfect, crisp but possibly blurry at fractional scale.
    # false = bilinear (smoother but can look blurry on small UI elements).
    use_nearest_neighbor = true

    # Force the scaling factor applied to XWayland apps.
    # If you use fractional scaling (e.g. 1.25), set this to match.
    # When 0, uses the output scale. If your X apps look too small, try 1.
    force_zero_scaling = false
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OPENGL (renderer tweaks)
# https://wiki.hyprland.org/Configuring/Variables/#opengl
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

opengl {
    # Nvidia-specific: force introspection of GPU memory layout.
    # Fixes rendering glitches on some NVIDIA setups.
    # nvidia_anti_flicker = true

    # Force software cursors (use if hardware cursor has graphical issues).
    # force_introspection = 2
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# RENDER (frame timing & performance)
# https://wiki.hyprland.org/Configuring/Variables/#render
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

render {
    # Explicitly sync to the monitor's vblank signal.
    # 0 = never (low latency, possible tearing)
    # 1 = always (no tearing, higher latency)
    # 2 = auto (Hyprland decides — recommended)
    # explicit_sync = 2

    # Use explicit sync for KMS (kernel modesetting).
    # Needed for some NVIDIA setups with explicit sync support.
    # explicit_sync_kms = 2

    # Reduce or eliminate flickering when a window's buffer hasn't
    # updated yet (holds last rendered frame). Increases latency slightly.
    direct_scanout = false
}


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CURSOR (misc cursor tweaks)
# https://wiki.hyprland.org/Configuring/Variables/#cursor
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

cursor {
    # Don't change the cursor when hovering over a resize area (keep arrow).
    # false = show resize arrows on border hover (more informative).
    no_hardware_cursors = false

    # Hide the cursor after this many milliseconds of inactivity.
    # 0 = never hide.
    inactive_timeout = 5

    # Don't warp the cursor to the focused window on workspace switch.
    # false = cursor jumps to follow the focused window (less disorienting).
    no_warps = false

    # Persist the cursor position between sessions (restore on next login).
    persistent_warps = false

    # Zoom factor for the cursor (zoom level when using cursor zoom feature).
    zoom_factor = 1.0

    # Rigid zoom — cursor stays in place when zoomed in.
    zoom_rigid = false

    # Enable hotspot for cursor (required for proper cursor rendering in some setups).
    enable_hyprcursor = true
}
