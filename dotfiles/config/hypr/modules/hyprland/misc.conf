# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Miscellaneous Hyprland settings that don't        ║
# ║            belong to a specific category — swallowing,       ║
# ║            focus behaviour, XWayland, cursor, etc.           ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Variables/#misc ║
