# ╔══════════════════════════════════════════════════════════════╗
# ║  THE DOTS — modules/hyprland/permissions.conf                ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Purpose : Security and permissions configuration.           ║
# ║            Controls which apps can access Hyprland APIs      ║
# ║            such as screensharing, input passthrough, and     ║
# ║            the privileged socket interface.                  ║
# ║  Wiki    : https://wiki.hyprland.org/Configuring/Permissions/║
# ╚══════════════════════════════════════════════════════════════╝
#
# WHY THIS MATTERS:
#   Hyprland exposes several powerful APIs. Without explicit
#   permission rules, any app could potentially grab your input,
#   record your screen, or control your compositor.
#
# PERMISSION TYPES:
#   screencopy  — access to screen capture (OBS, screenshare, etc.)
#   keyboard    — access to global keyboard input (keycapture)
#   pointer     — access to global pointer (mouse) input
#   touch       — access to touchscreen input passthrough
#
# PERMISSION VALUES:
#   allow  — always allow (no prompt)
#   deny   — always deny
#   ask    — prompt the user (interactive dialog via polkit)
# ─────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ECOSYSTEM TRUSTED APPS
# These are Hyprland's own tools — safe to allow unconditionally.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# hyprlock — needs screencopy to render the lockscreen preview.
permission = /usr/bin/hyprlock, screencopy, allow

# hyprpicker — needs screencopy to read pixel colors from the screen.
permission = /usr/bin/hyprpicker, screencopy, allow

# grimblast/grim — screencapture tools.
permission = /usr/bin/grim, screencopy, allow

# wl-screenrec — screen recording.
# permission = /usr/bin/wl-screenrec, screencopy, allow

# wf-recorder — another screen recorder.
# permission = /usr/bin/wf-recorder, screencopy, allow


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MEDIA & STREAMING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# OBS Studio — screencapture for streaming/recording.
# OBS uses xdg-desktop-portal under the hood on Wayland.
permission = /usr/bin/obs, screencopy, allow

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COMMUNICATION APPS
# Apps that may request screenshare for video calls.
# "ask" prompts you each time — safer than blanket allow.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Discord — screenshare in calls.
# Uses xdg-portal, but explicit permission helps on some builds.
permission = /usr/bin/discord, screencopy, ask

# Zoom, Teams, etc. — uncomment as needed
# permission = /usr/bin/zoom, screencopy, ask
# permission = /usr/bin/teams, screencopy, ask


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# INPUT CAPTURE
# Be careful with these — malicious apps with keyboard/pointer
# access can silently log keystrokes.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# wl-kbptr — keyboard pointer (accessibility tool, rarely needed)
# permission = /usr/bin/wl-kbptr, keyboard, allow

# Input remappers — these need input access to remap keys globally.
# Only allow tools you explicitly installed.
# permission = /usr/bin/input-remapper-gtk, keyboard, ask
# permission = /usr/bin/kanata, keyboard, allow


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEFAULT CATCH-ALL
# Any app not listed above falls back to these defaults.
# "ask" is the safest default — you'll be prompted before
# any unlisted app can access screencopy or input.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# NOTE: Catch-all permission rules are not yet supported in all
# Hyprland versions. The rules above are per-binary.
# For system-wide policy, configure xdg-desktop-portal and polkit.
# See: https://wiki.hyprland.org/Useful-Utilities/xdg-desktop-portal-hyprland/
