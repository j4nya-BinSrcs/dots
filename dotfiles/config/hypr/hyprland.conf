#
# This file is the single entry point for Hyprland's configuration.
# It does nothing itself — it only sources the module files below.
# Each module is self-contained, documented, and independently editable.
#
# Module load order matters:
#   programs → environment → monitors → visuals → layouts
#   → input → startup → binds → misc → permissions
#
# To reload config live: hyprctl reload
# ─────────────────────────────────────────────────────────────────


# ── Core: programs & env must load before anything else ──────────
source = ~/.config/hypr/modules/hyprland/programs.conf
source = ~/.config/hypr/modules/hyprland/environment.conf

# ── Display ───────────────────────────────────────────────────────
source = ~/.config/hypr/modules/hyprland/monitors.conf

# ── Appearance ────────────────────────────────────────────────────
source = ~/.config/hypr/modules/hyprland/visuals.conf
source = ~/.config/hypr/modules/hyprland/layouts.conf

# ── Behaviour ─────────────────────────────────────────────────────
source = ~/.config/hypr/modules/hyprland/input.conf
source = ~/.config/hypr/modules/hyprland/misc.conf

# ── Session ───────────────────────────────────────────────────────
source = ~/.config/hypr/modules/hyprland/startup.conf
source = ~/.config/hypr/modules/hyprland/binds.conf

# ── Security ──────────────────────────────────────────────────────
source = ~/.config/hypr/modules/hyprland/permissions.conf
